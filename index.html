<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>댓글 활동 조회 | 사람인 멘토링매치</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .logo { font-size: 13px; font-weight: 600; color: #1a6ef5; margin-bottom: 1rem; letter-spacing: -0.01em; }
    h1 { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; line-height: 1.6; }
    .period-card {
      background: #f0f5ff;
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .period-label { font-size: 11px; color: #1e3a8a; margin-bottom: 3px; }
    .period-value { font-size: 14px; font-weight: 600; color: #1e40af; }
    .remain-txt { font-size: 12px; font-weight: 600; color: #2563eb; }
    .input-label { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 8px; }
    .input-wrap { display: flex; gap: 8px; margin-bottom: 8px; }
    .input-wrap input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      font-size: 14px;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-wrap input:focus { border-color: #2563eb; }
    .input-wrap input::placeholder { color: #bbb; }
    .run-btn {
      padding: 12px 20px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
      white-space: nowrap;
    }
    .run-btn:hover { opacity: 0.82; }
    .run-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .input-hint { font-size: 12px; color: #bbb; margin-bottom: 1.5rem; }
    .input-hint code { background: #f5f5f5; padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 11px; }
    .err-box {
      background: #fff5f5; border: 1px solid #fcc;
      border-radius: 10px; padding: 12px 16px;
      font-size: 13px; color: #c00;
      display: none; margin-bottom: 1rem; line-height: 1.6;
    }
    .result-wrap { display: none; }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
    .result-card { border: 1px solid #eee; border-radius: 12px; overflow: hidden; }
    .result-card.current { border-color: #bfdbfe; }
    .result-head { padding: 10px 14px; background: #f8f8f8; border-bottom: 1px solid #eee; }
    .result-card.current .result-head { background: #f0f5ff; border-bottom-color: #bfdbfe; }
    .result-head .period-tag { font-size: 11px; font-weight: 600; color: #888; margin-bottom: 2px; }
    .result-card.current .result-head .period-tag { color: #2563eb; }
    .result-head .period-range { font-size: 11px; color: #bbb; font-family: monospace; }
    .result-body { padding: 16px 14px; text-align: center; }
    .count-num { font-size: 48px; font-weight: 700; color: #ccc; line-height: 1; margin-bottom: 4px; }
    .count-num.done { color: #111; }
    .result-card.current .count-num.done { color: #2563eb; }
    .count-unit { font-size: 13px; color: #aaa; }
    .count-desc { font-size: 11px; color: #ccc; margin-top: 4px; }
    .prog-wrap { height: 3px; background: #f0f0f0; border-radius: 2px; overflow: hidden; margin-top: 12px; }
    .prog-bar { height: 100%; background: #2563eb; border-radius: 2px; width: 0%; transition: width 0.5s; }
    .prog-bar.prev { background: #94a3b8; }
    .status-txt { font-size: 11px; color: #bbb; margin-top: 5px; text-align: center; min-height: 14px; }
    .guide { background: #f8f8f8; border-radius: 10px; padding: 14px 16px; font-size: 12px; color: #888; line-height: 1.8; }
    .guide strong { color: #555; font-weight: 600; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">✦ 사람인 멘토링매치</div>
  <h1>댓글 활동 조회</h1>
  <p class="subtitle">프로필 URL 또는 ID를 입력하면<br>현재 및 직전 기간의 150자 이상 댓글 수를 확인할 수 있습니다.</p>

  <div class="period-card">
    <div>
      <div class="period-label">현재 집계 기간</div>
      <div class="period-value" id="period-text">—</div>
    </div>
    <div class="remain-txt" id="remain-text"></div>
  </div>

  <div class="input-label">내 프로필 URL 또는 ID 입력</div>
  <div class="input-wrap">
    <input type="text" id="url-input" placeholder="https://career.saramin.co.kr/profile/view/..." />
    <button class="run-btn" id="run-btn" onclick="runSearch()">조회</button>
  </div>
  <div class="input-hint">숫자 ID만 입력해도 됩니다 예: <code>20386702</code></div>

  <div class="err-box" id="err-box"></div>

  <div class="result-wrap" id="result-wrap">
    <div class="result-grid">
      <div class="result-card current">
        <div class="result-head">
          <div class="period-tag">현재 기간</div>
          <div class="period-range" id="cur-range">—</div>
        </div>
        <div class="result-body">
          <div class="count-num" id="cur-count">—</div>
          <div class="count-unit">개</div>
          <div class="count-desc">150자 이상</div>
          <div class="prog-wrap"><div class="prog-bar" id="cur-prog"></div></div>
          <div class="status-txt" id="cur-status"></div>
        </div>
      </div>
      <div class="result-card">
        <div class="result-head">
          <div class="period-tag">직전 기간</div>
          <div class="period-range" id="prev-range">—</div>
        </div>
        <div class="result-body">
          <div class="count-num" id="prev-count">—</div>
          <div class="count-unit">개</div>
          <div class="count-desc">150자 이상</div>
          <div class="prog-wrap"><div class="prog-bar prev" id="prev-prog"></div></div>
          <div class="status-txt" id="prev-status"></div>
        </div>
      </div>
    </div>
    <div class="guide">
      <strong>집계 기준 안내</strong><br>
      · 매월 15일 ~ 익월 14일 기준으로 집계됩니다<br>
      · 공백 포함 150자 이상 댓글만 카운트됩니다<br>
      · 조회 시점 기준 최신 데이터가 반영됩니다
    </div>
  </div>
</div>

<script>
function getPeriods() {
  const now = new Date();
  const y = now.getFullYear(), mo = now.getMonth(), d = now.getDate();
  let curStart, curEnd, prevStart, prevEnd;
  if (d >= 15) {
    curStart  = new Date(y, mo, 15, 0, 0, 0);
    curEnd    = new Date(y, mo + 1, 14, 23, 59, 59);
    prevStart = new Date(y, mo - 1, 15, 0, 0, 0);
    prevEnd   = new Date(y, mo, 14, 23, 59, 59);
  } else {
    curStart  = new Date(y, mo - 1, 15, 0, 0, 0);
    curEnd    = new Date(y, mo, 14, 23, 59, 59);
    prevStart = new Date(y, mo - 2, 15, 0, 0, 0);
    prevEnd   = new Date(y, mo - 1, 14, 23, 59, 59);
  }
  return { curStart, curEnd, prevStart, prevEnd };
}

function fmt(d) {
  return (d.getMonth()+1) + '/' + d.getDate();
}
function fmtFull(d) {
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}

function parseId(input) {
  input = input.trim();
  const m = input.match(/profile\/view\/(\d+)/);
  if (m) return m[1];
  if (/^\d+$/.test(input)) return input;
  return null;
}

function initDisplay() {
  const now = new Date();
  const { curStart, curEnd } = getPeriods();
  document.getElementById('period-text').textContent = fmtFull(curStart) + ' ~ ' + fmtFull(curEnd);
  const days = Math.ceil((curEnd - now) / 86400000);
  document.getElementById('remain-text').textContent = days > 0 ? '마감 ' + days + '일 전' : '기간 마감';
}

async function runSearch() {
  const input = document.getElementById('url-input').value;
  const id = parseId(input);
  document.getElementById('err-box').style.display = 'none';
  if (!id) {
    document.getElementById('err-box').textContent = '올바른 프로필 URL 또는 숫자 ID를 입력해주세요.';
    document.getElementById('err-box').style.display = 'block';
    return;
  }

  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = '조회 중...';
  document.getElementById('result-wrap').style.display = 'block';

  const { curStart, curEnd, prevStart, prevEnd } = getPeriods();
  document.getElementById('cur-range').textContent = fmt(curStart) + ' ~ ' + fmt(curEnd);
  document.getElementById('prev-range').textContent = fmt(prevStart) + ' ~ ' + fmt(prevEnd);
  document.getElementById('cur-count').textContent = '...';
  document.getElementById('cur-count').className = 'count-num';
  document.getElementById('prev-count').textContent = '...';
  document.getElementById('prev-count').className = 'count-num';
  document.getElementById('cur-prog').style.width = '0%';
  document.getElementById('prev-prog').style.width = '0%';
  document.getElementById('cur-status').textContent = '불러오는 중...';
  document.getElementById('prev-status').textContent = '불러오는 중...';

  try {
    document.getElementById('cur-prog').style.width = '40%';
    const res = await fetch('/api/comments?userId=' + id);
    if (!res.ok) throw new Error('HTTP ' + res.status);

    document.getElementById('cur-prog').style.width = '80%';
    document.getElementById('prev-prog').style.width = '80%';
    const data = await res.json();

    if (data.code !== 200 || !data.body || !data.body.content) {
      throw new Error(data.error || '데이터를 불러올 수 없습니다.');
    }

    const content = data.body.content;

    const curPassing = content.filter(function(item) {
      const d = new Date(item.regDtm);
      return d >= curStart && d <= curEnd && item.contCnnt && item.contCnnt.length >= 150;
    });
    const prevPassing = content.filter(function(item) {
      const d = new Date(item.regDtm);
      return d >= prevStart && d <= prevEnd && item.contCnnt && item.contCnnt.length >= 150;
    });

    document.getElementById('cur-prog').style.width = '100%';
    document.getElementById('prev-prog').style.width = '100%';
    document.getElementById('cur-count').textContent = curPassing.length;
    document.getElementById('cur-count').className = 'count-num done';
    document.getElementById('cur-status').textContent = '완료';
    document.getElementById('prev-count').textContent = prevPassing.length;
    document.getElementById('prev-count').className = 'count-num done';
    document.getElementById('prev-status').textContent = '완료';

  } catch (e) {
    document.getElementById('err-box').textContent = '조회 중 오류가 발생했습니다. 프로필이 공개 상태인지 확인하거나 잠시 후 다시 시도해주세요.';
    document.getElementById('err-box').style.display = 'block';
    document.getElementById('cur-status').textContent = '오류';
    document.getElementById('prev-status').textContent = '오류';
  }

  btn.disabled = false;
  btn.textContent = '조회';
}

document.getElementById('url-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') runSearch();
});

initDisplay();
</script>
</body>
</html>
